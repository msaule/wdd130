<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            font-family: Georgia, "Times New Roman", serif;
            min-height: 100vh;
            padding: 18px;
        }

        #formContainer {
            background: white;
            border: 10px solid #0d3d91;
            border-radius: 28px;
            margin: 0 auto;
            overflow: hidden;
            width: 420px;
        }

        .banner {
            background-image: linear-gradient(rgba(0, 0, 0, .05), rgba(0, 0, 0, .1)), url("images/jesus_feeds_5000.jpeg");
            background-position: center 42%;
            background-size: cover;
            height: 170px;
            position: relative;
        }

        #closeBtn {
            background: #f6f6f6;
            border: 1px solid #888;
            border-radius: 2px;
            cursor: pointer;
            font-size: 18px;
            height: 26px;
            left: 14px;
            position: absolute;
            top: 12px;
            width: 28px;
        }

        #closeBtn:hover {
            background: #e8e8e8;
        }

        .banner h1,
        .banner h2 {
            color: white;
            line-height: 1.05;
            position: relative;
            text-align: center;
            text-shadow: 2px 2px 0 black;
            top: 78px;
        }

        .banner h1 {
            font-size: 34px;
        }

        .banner h2 {
            font-size: 28px;
            margin-top: 4px;
        }

        .form-area {
            padding: 20px 20px 18px;
        }

        .form-area h3 {
            font-size: 18px;
            margin-bottom: 18px;
            text-align: center;
        }

        #myForm {
            display: grid;
            gap: 16px;
        }

        .form-row {
            align-items: center;
            display: grid;
            grid-template-columns: 170px 1fr;
        }

        .form-row input[type="text"],
        .form-row input[type="password"],
        .form-row input[type="email"] {
            border: 1px solid #777;
            font: inherit;
            height: 22px;
            padding: 2px 6px;
        }

        .radio-row {
            display: flex;
            gap: 4px;
        }

        .check-row,
        .submit-row {
            justify-content: center;
            display: flex;
        }

        .check-row {
            gap: 4px;
        }

        button[type="submit"] {
            background: #eeeeee;
            border: 1px solid #777;
            border-radius: 2px;
            cursor: pointer;
            font: inherit;
            padding: 3px 8px;
        }

        button[type="submit"]:hover {
            background: #dedede;
        }

        .scripture-books {
            background: #111;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding-top: 0;
        }

        .scripture-books img {
            display: block;
            height: 100px;
            object-fit: cover;
            width: 100%;
        }

        #output {
            background: rgba(255, 255, 255, .92);
            border-radius: 8px;
            margin: 18px auto 0;
            max-width: 420px;
            padding: 0 18px 14px;
        }

        #output:empty {
            display: none;
        }

        #output h3 {
            margin-bottom: 10px;
        }

        #output ul {
            padding-left: 22px;
        }

        @media (max-width: 500px) {
            body {
                padding: 10px;
            }

            #formContainer,
            #output {
                width: 100%;
            }

            .form-row {
                gap: 6px;
                grid-template-columns: 1fr;
            }

            .banner h1 {
                font-size: 30px;
            }

            .banner h2 {
                font-size: 24px;
            }
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <section class="banner">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </section>

        <section class="form-area">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">
                <section class="form-row">
                    <label for="username">User Name:</label>
                    <input type="text" id="username" name="username" required>
                </section>

                <section class="form-row">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </section>

                <section class="form-row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </section>

                <section class="form-row">
                    <label>Gender:</label>
                    <div class="radio-row">
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female" required>
                        <label for="female">Female</label>
                    </div>
                </section>

                <section class="check-row">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section class="check-row">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section class="submit-row">
                    <button type="submit">Submit</button>
                </section>
            </form>
        </section>

        <section class="scripture-books">
            <img src="images/old_testament.webp" alt="Old Testament">
            <img src="images/new_testament.webp" alt="New Testament">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </section>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
