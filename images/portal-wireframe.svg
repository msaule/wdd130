<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1700" role="img" aria-labelledby="title desc">
  <title id="title">Portal page wireframe</title>
  <desc id="desc">A labeled wireframe for the WDD 130 portal page.</desc>
  <rect width="1200" height="1700" fill="#faf8f3"/>

  <rect x="40" y="30" width="1120" height="120" fill="#ffffff" stroke="#22303C" stroke-width="4"/>
