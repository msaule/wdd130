  <text x="680" y="1412" font-family="Verdana" font-size="24" fill="#2B2B2B">Message</text>
  <rect x="790" y="1386" width="260" height="52" fill="#ffffff" stroke="#2B2B2B" stroke-width="2"/>

  <rect x="40" y="1520" width="1120" height="120" fill="#ffffff" stroke="#22303C" stroke-width="4"/>
