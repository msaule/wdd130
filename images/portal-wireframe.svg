  <text x="240" y="930" text-anchor="middle" font-family="Verdana" font-size="22" fill="#2B2B2B">image + heading + link</text>
  <text x="600" y="930" text-anchor="middle" font-family="Verdana" font-size="22" fill="#2B2B2B">image + heading + link</text>
  <text x="960" y="930" text-anchor="middle" font-family="Verdana" font-size="22" fill="#2B2B2B">image + heading + link</text>

