  <line x1="660" y1="1190" x2="1120" y2="1190" stroke="#2B2B2B" stroke-width="2"/>
  <line x1="660" y1="1232" x2="1120" y2="1232" stroke="#2B2B2B" stroke-width="2"/>
  <line x1="815" y1="1148" x2="815" y2="1274" stroke="#2B2B2B" stroke-width="2"/>
  <line x1="970" y1="1148" x2="970" y2="1274" stroke="#2B2B2B" stroke-width="2"/>
  <text x="660" y="1325" font-family="Verdana" font-size="20" fill="#66727F">Form area</text>
